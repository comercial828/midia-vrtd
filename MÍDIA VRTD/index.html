<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MÍDIA VRTD — Agência de Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans antialiased">

  <!-- ======================== AUTH CONTAINER ======================== -->
  <div id="auth-container"></div>

  <!-- ======================== MAIN APP ======================== -->
  <div id="app-container" class="hidden flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-900 flex flex-col flex-shrink-0 overflow-y-auto">
    </aside>

    <!-- Main Column -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">
      <!-- Header -->
      <header id="top-header" class="bg-white border-b border-slate-200 flex-shrink-0 z-10">
      </header>
      <!-- Page Content -->
      <main id="page-content" class="flex-1 overflow-y-auto">
      </main>
    </div>
  </div>

  <!-- ======================== GLOBAL MODAL ======================== -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div id="modal-container" class="bg-white rounded-2xl shadow-2xl w-full max-h-[92vh] overflow-y-auto relative">
    </div>
  </div>

  <!-- ======================== TOAST ======================== -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-2 pointer-events-none">
  </div>

  <!-- ======================== SCRIPTS ======================== -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/gut.js"></script>
  <script src="js/distribution.js"></script>
  <script src="js/dates.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/components.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/manager.js"></script>
  <script src="js/pages/designer.js"></script>
  <script src="js/pages/videomaker.js"></script>
  <script src="js/pages/social.js"></script>
  <script src="js/pages/pastor.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
